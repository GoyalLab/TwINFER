name: twinfer-code

channels:
  - conda-forge
  - defaults

dependencies:
  # --------------------------------------------------
  # Core
  # --------------------------------------------------
  - python=3.12

  # --------------------------------------------------
  # Numerics (NUMBA-SAFE)
  # --------------------------------------------------
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas=2.3.*

  # --------------------------------------------------
  # Performance
  # --------------------------------------------------
  - numba=0.61.*
  - llvmlite=0.44.*
  - joblib

  # --------------------------------------------------
  # Plotting
  # --------------------------------------------------
  - matplotlib=3.10.*
  - seaborn=0.13.*

  # --------------------------------------------------
  # Stats / ML
  # --------------------------------------------------
  - scikit-learn=1.7.*
  - statsmodels=0.14.*

  # --------------------------------------------------
  # Single-cell
  # --------------------------------------------------
  - scanpy=1.11.*
  - anndata=0.12.*
  - umap-learn

  # --------------------------------------------------
  # Graphs
  # --------------------------------------------------
  - networkx

  # --------------------------------------------------
  # Jupyter
  # --------------------------------------------------
  - jupyter
  - ipykernel
  - ipywidgets
  - notebook
  - jupyterlab

  # --------------------------------------------------
  # IO / storage
  # --------------------------------------------------
  - h5py
  - zarr
  - openpyxl
  - xlrd
  - pillow
  - pyyaml

  # --------------------------------------------------
  # Utilities
  # --------------------------------------------------
  - tqdm
  - natsort
  - pip

  # --------------------------------------------------
  # Pip-only packages (SAFE)
  # --------------------------------------------------
  - pip:
      - adjusttext>=1.3
      - tqdm-joblib>=0.0.5
      - session-info2
      - mygene
      - biothings-client
      - zstandard
